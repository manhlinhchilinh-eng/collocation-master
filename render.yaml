services:
  - type: web
    name: collocation-master
    runtime: node
    plan: free
    buildCommand: npm install && cd client && npm install && npx vite build --outDir ../server/public && cd ..
    startCommand: node server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
